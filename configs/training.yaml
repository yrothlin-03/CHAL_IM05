evaluation: false
submission_path: /home/infres/yrothlin-24/CHAL_IM05/submissions/submission.csv


training:
  save_ckpt: true
  ckpt_dir: /home/infres/yrothlin-24/CHAL_IM05/checkpoints/tests
  ckpt_every: 1
  resume_from: /home/infres/yrothlin-24/CHAL_IM05/checkpoints/tests/best.pt
  resume: true
  resume_from_pretrained: /home/infres/yrothlin-24/CHAL_IM05/checkpoints/contrastive_pretraining/best.pt
  resume_pretrained: true
  monitor: macro_f1
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_mode: max

  use_mixup: true
  mixup_alpha: 0.2
  use_cutmix: true
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

  # rare_classes_for_no_aug: [12, 11, 9, 5, 6, 7, 8]

  loss: focal
  gamma: 2.0

  bb_lr: 0.0003
  head_lr: 0.0003
  finetune_bb_lr: 0.0001
  finetune_head_lr: 0.0001

  weight_decay: 0.0001
  num_epochs: 60
  warmup_epochs: 0

  optimizer: adamw
  scheduler: cosine_restarts

  use_amp: false
  grad_clip: 1.0
  log_step: 50

  tta_rounds: 4
  label_smoothing: 0.05

  use_weights: false
  weights:
    - 0.131885
    - 0.167166
    - 0.287122
    - 0.512761
    - 0.738572
    - 0.786459
    - 0.760902
    - 0.792986
    - 0.716469
    - 1.409173
    - 0.335431
    - 1.824578
    - 4.536496

  plot_tsne: true
  tsne_split: "val"
  tsne_every: 5
  tsne_max_samples: 1000
  tsne_perplexity: 30
  tsne_dir: "/home/infres/yrothlin-24/CHAL_IM05/logs/tests/TSNE"

  plot_confusion: true
  confusion_split: "val"
  confusion_every: 5
  confusion_normalize: true 
  confusion_dir: "/home/infres/yrothlin-24/CHAL_IM05/logs/tests/confusion"
  class_names:
    - "SNE"
    - "LY"
    - "MO"
    - "EO"
    - "BA"
    - "VLY"
    - "BNE"
    - "MMY"
    - "MY"
    - "PMY"
    - "BL"
    - "PC"
    - "PLY"


data:
  train_ratio: 0.9
  seed: 42
  batch_size: 64 
  shuffle: true
  num_workers: 4
  pin_memory: true
  n_splits: 1
  use_weighted_sampler: true
  use_undersampling: false
  sampler_power: 0.5
  with_tta: true

model:
  num_classes: 13
  backbone_name: CONVNEXT_TINY
  head_name: LINEAR
  freeze_backbone: false
  pretrained: true


